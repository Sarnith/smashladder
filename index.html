<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smash Ladder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
:root{
--court:#0d1f0f;--court-mid:#142918;--court-line:#1e3d22;
--green:#4ade80;--green-dim:#22c55e33;--yellow:#fbbf24;
--red:#f87171;--red-dim:#f8717122;--text:#e8f5e9;--muted:#6b7c6d;--card:#162019;--border:#243d27;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Space Grotesk',sans-serif;background:var(--court);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;
background-image:linear-gradient(to right,var(--court-line) 1px,transparent 1px),linear-gradient(to bottom,var(--court-line) 1px,transparent 1px);
background-size:60px 60px;opacity:.25;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:0 14px 60px;}
header{padding:24px 0 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.logo-text{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--green);}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.session-btn{background:var(--green);color:var(--court);border:none;padding:10px 16px;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.tabs{display:flex;gap:3px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:20px;}
.tab{flex:1;padding:8px 4px;border:none;background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;border-radius:7px;cursor:pointer;text-align:center;}
.tab.active{background:var(--court-line);color:var(--green);}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;position:relative;overflow:hidden;}
.card-accent{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);}
.card-accent.gold{background:var(--yellow);}
.card-accent.silver{background:#94a3b8;}
.card-accent.bronze{background:#b45309;}
.player-row{display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:10px;}
.rank-num{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--muted);text-align:center;}
.rank-gold .rank-num{color:var(--yellow);}
.rank-silver .rank-num{color:#94a3b8;}
.rank-bronze .rank-num{color:#b45309;}
.player-name{font-size:15px;font-weight:600;}
.player-stats{font-size:11px;color:var(--muted);margin-top:2px;}
.delta{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;}
.delta-up{color:var(--green);}
.delta-down{color:var(--red);}
.delta-none{color:var(--muted);}
/* Remove button */
.rank-edit-input{
width:42px;height:42px;text-align:center;
background:var(--court-mid);border:1px solid var(--border);border-radius:8px;
color:var(--muted);font-family:'Space Mono',monospace;font-size:18px;font-weight:700;
outline:none;cursor:pointer;flex-shrink:0;
}
.rank-edit-input:focus{border-color:var(--green);color:var(--green);}
.remove-btn{background:transparent;border:1px solid var(--red);color:var(--red);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.remove-btn:hover{background:var(--red-dim);}
/* Inline confirm banner */
.confirm-banner{background:var(--red-dim);border:1px solid rgba(248,113,113,.4);border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px;}
.confirm-banner-msg{color:var(--red);}
.confirm-banner-btns{display:flex;gap:7px;flex-shrink:0;}
.cbtn-yes{background:var(--red);color:#fff;border:none;padding:5px 12px;border-radius:5px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.cbtn-no{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:5px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
/* Session */
.session-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
.session-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.session-meta{font-size:12px;color:var(--muted);margin-bottom:12px;}
.progress-wrap{background:var(--border);border-radius:4px;height:4px;margin-bottom:16px;overflow:hidden;}
.progress-fill{height:100%;background:var(--green);border-radius:4px;transition:width .3s;}
.court-block{background:var(--court-mid);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
.court-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.court-lbl{font-size:12px;font-weight:700;color:var(--green);letter-spacing:1px;text-transform:uppercase;}
.court-fmt{font-size:11px;color:var(--muted);}
.court-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.pill{font-size:12px;font-weight:600;background:var(--court-line);border:1px solid var(--border);border-radius:20px;padding:3px 10px;display:inline-flex;align-items:center;gap:5px;}
.pill-remove{background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;font-weight:700;padding:0;line-height:1;}
.max-score-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;color:var(--muted);}
.score-opt{padding:4px 12px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;}
.score-opt.active{background:var(--green);color:var(--court);border-color:var(--green);}
.game-card{background:var(--court);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.game-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--border);}
.game-num{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);}
.game-status-done{font-size:10px;font-weight:700;color:var(--green);}
.game-status-pending{font-size:10px;font-weight:700;color:var(--yellow);}
.game-score-body{display:grid;grid-template-columns:1fr auto 1fr;}
.pair-col{display:flex;flex-direction:column;align-items:center;padding:12px 8px;gap:6px;cursor:pointer;transition:background .15s;}
.pair-col:hover{background:var(--green-dim);}
.pair-col.won{background:var(--green-dim);}
.pair-col.lost{opacity:.4;}
.pair-names-stacked{text-align:center;font-size:13px;font-weight:700;line-height:1.4;}
.score-inputs{display:flex;align-items:center;gap:6px;margin-top:4px;}
.score-input{width:48px;height:38px;text-align:center;background:var(--court-mid);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Space Mono',monospace;font-size:18px;font-weight:700;outline:none;}
.score-input:focus{border-color:var(--green);}
.score-input.winning{border-color:var(--green);color:var(--green);}
.score-input.losing{border-color:var(--border);color:var(--muted);}
.vs-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 6px;background:var(--court-mid);border-left:1px solid var(--border);border-right:1px solid var(--border);}
.vs-text{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);}
.vs-score{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--text);margin-top:4px;}
.edit-btn{font-size:10px;color:var(--muted);background:transparent;border:none;cursor:pointer;text-decoration:underline;padding:2px;}
.scoreboard{margin-top:10px;border-top:1px solid var(--border);padding-top:10px;}
.scoreboard-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.sb-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);}
.sb-row:last-child{border-bottom:none;}
.sb-rank{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);width:20px;}
.sb-name{font-size:13px;font-weight:600;flex:1;}
.sb-pts{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--green);}
.sb-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:6px;}
.tag-up{background:var(--green-dim);color:var(--green);border:1px solid var(--green);}
.tag-down{background:var(--red-dim);color:var(--red);border:1px solid var(--red);}
.section-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.add-form{display:flex;gap:8px;margin-bottom:16px;}
.add-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;}
.add-input:focus{border-color:var(--green);}
.add-input::placeholder{color:var(--muted);}
.add-btn{background:var(--green);color:var(--court);border:none;padding:10px 16px;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.btn{padding:10px 16px;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;}
.btn-primary{background:var(--green);color:var(--court);}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:14px;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;margin-top:-4px;}
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px;margin-bottom:14px;}
.player-check{background:var(--court-mid);border:1px solid var(--border);border-radius:8px;padding:9px 11px;cursor:pointer;transition:all .15s;user-select:none;}
.player-check.attending{border-color:var(--green);background:var(--green-dim);}
.check-name{font-size:13px;font-weight:600;}
.check-rank{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;}
.history-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.history-date{font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:var(--court);padding:10px 22px;border-radius:8px;font-weight:700;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;line-height:1.7;}
.empty-icon{font-size:36px;margin-bottom:10px;}
hr.div{border:none;border-top:1px solid var(--border);margin:10px 0;}
</style>
</head>
<body>
<div class="wrap">
<header>
<div>
<div class="logo-text">🏸 SMASH LADDER</div>
<div class="logo-sub">Badminton Rankings</div>
</div>
<button class="session-btn" id="new-session-btn">+ New Session</button>
</header>
<div class="tabs">
<button class="tab active" data-tab="ladder">🏆 Ladder</button>
<button class="tab" data-tab="session">🎮 Session</button>
<button class="tab" data-tab="history">📋 History</button>
<button class="tab" data-tab="players">👤 Players</button>
</div>
<div id="tab-ladder"></div>
<div id="tab-session" style="display:none"></div>
<div id="tab-history" style="display:none"></div>
<div id="tab-players" style="display:none"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────
const KEY='smash_v3';
function def(){return{players:[],nextId:1,sessions:[],activeSession:null};}
function load(){try{return JSON.parse(localStorage.getItem(KEY))||def();}catch{return def();}}
function save(){localStorage.setItem(KEY,JSON.stringify(S));}
let S=load();

// pending remove state
let pendingRemovePlayer=null; // player id
let pendingRemoveSession=null; // {ci, pid}

// ── Tabs ──────────────────────────────────────────────────────────────
let currentTab='ladder';
document.querySelectorAll('.tab').forEach(btn=>{
btn.addEventListener('click',()=>showTab(btn.dataset.tab));
});
document.getElementById('new-session-btn').addEventListener('click',openSessionModal);

function showTab(t){
currentTab=t;
document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
['ladder','session','history','players'].forEach(x=>
document.getElementById('tab-'+x).style.display=x===t?'':'none');
pendingRemovePlayer=null;
pendingRemoveSession=null;
render();
}
function render(){
if(currentTab==='ladder') renderLadder();
if(currentTab==='session') renderSession();
if(currentTab==='history') renderHistory();
if(currentTab==='players') renderPlayers();
}

// ── Utils ─────────────────────────────────────────────────────────────
function gp(id){return S.players.find(p=>p.id===Number(id));}
function nameOf(id){return gp(id)?.name||'?';}
function toast(msg){
const t=document.getElementById('toast');
t.textContent=msg;t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),2500);
}
function el(id){return document.getElementById(id);}

// ── Ladder ────────────────────────────────────────────────────────────
function renderLadder(){
const sorted=[...S.players].sort((a,b)=>a.rank-b.rank);
const root=el('tab-ladder');
if(!sorted.length){root.innerHTML='<div class="empty"><div class="empty-icon">🏸</div>No players yet.<br>Add players in the Players tab.</div>';return;}
let h='<div class="section-label">'+sorted.length+' players ranked</div>';
sorted.forEach(p=>{
const ac=p.rank===1?'gold':p.rank===2?'silver':p.rank===3?'bronze':'';
const rc=p.rank===1?'rank-gold':p.rank===2?'rank-silver':p.rank===3?'rank-bronze':'';
const d=p.rankDelta||0;
const dh=d>0?'<span class="delta delta-up">▲'+d+'</span>':d<0?'<span class="delta delta-down">▼'+Math.abs(d)+'</span>':'<span class="delta delta-none">—</span>';
const wr=(p.wins+p.losses)>0?Math.round(p.wins/(p.wins+p.losses)*100):0;
h+='<div class="card '+rc+'"><div class="card-accent '+ac+'"></div><div class="player-row"><div class="rank-num">'+p.rank+'</div><div><div class="player-name">'+p.name+'</div><div class="player-stats">'+p.wins+'W · '+p.losses+'L · '+(p.totalPts||0)+' pts'+(p.sessions>0?' · '+wr+'% win rate':'')+'</div></div>'+dh+'</div></div>';
});
root.innerHTML=h;
}

// ── Players tab ───────────────────────────────────────────────────────
function renderPlayers(){
const sorted=[...S.players].sort((a,b)=>a.rank-b.rank);
const root=el('tab-players');
let h='<div class="add-form"><input class="add-input" id="new-name" placeholder="Player name…"><button class="add-btn" id="add-btn">Add</button></div>';
h+='<div class="card" style="margin-bottom:14px;"><div class="section-label" style="margin-bottom:8px;">Bulk add players (one name per line)</div>'
+'<textarea id="bulk-names" rows="5" style="width:100%;background:var(--court-mid);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-family:\'Space Grotesk\',sans-serif;font-size:13px;outline:none;resize:vertical;" placeholder="Karthik&#10;Sarnith&#10;Kishore&#10;..."></textarea>'
+'<div class="btn-row" style="margin-top:10px;"><button class="btn btn-primary" id="bulk-add-btn">Add All</button></div></div>';
h+='<div class="section-label" style="margin-bottom:6px;">'+sorted.length+' players — tap rank number to edit</div>';

if(pendingRemovePlayer!==null){
const pp=gp(pendingRemovePlayer);
h+='<div class="confirm-banner"><span class="confirm-banner-msg">Remove <strong>'+(pp?pp.name:'player')+'</strong> from the ladder?</span>'
+'<div class="confirm-banner-btns"><button class="cbtn-yes" id="confirm-yes-btn">Remove</button><button class="cbtn-no" id="confirm-no-btn">Cancel</button></div></div>';
}

sorted.forEach(p=>{
const isTarget=pendingRemovePlayer===p.id;
h+='<div class="card" style="'+(isTarget?'border-color:var(--red);':'')+'"><div class="player-row">'
+'<input class="rank-edit-input" data-pid="'+p.id+'" value="'+p.rank+'" type="number" min="1" max="'+S.players.length+'" title="Edit rank">'
+'<div><div class="player-name">'+p.name+'</div><div class="player-stats">'+p.wins+'W · '+p.losses+'L · '+(p.totalPts||0)+' pts</div></div>'
+'<button class="remove-btn" data-pid="'+p.id+'">✕</button>'
+'</div></div>';
});
root.innerHTML=h;

el('new-name').addEventListener('keydown',e=>{if(e.key==='Enter')addPlayer();});
el('add-btn').addEventListener('click',addPlayer);
el('bulk-add-btn').addEventListener('click',bulkAddPlayers);

root.querySelectorAll('.remove-btn').forEach(btn=>{
btn.addEventListener('click',()=>{
pendingRemovePlayer=Number(btn.dataset.pid);
renderPlayers();
});
});

if(pendingRemovePlayer!==null){
el('confirm-yes-btn').addEventListener('click',()=>doRemovePlayer(pendingRemovePlayer));
el('confirm-no-btn').addEventListener('click',()=>{pendingRemovePlayer=null;renderPlayers();});
}

root.querySelectorAll('.rank-edit-input').forEach(inp=>{
const apply=()=>{
const pid=Number(inp.dataset.pid);
const newRank=parseInt(inp.value);
if(isNaN(newRank)||newRank<1||newRank>S.players.length){inp.value=gp(pid)?.rank;return;}
setPlayerRank(pid,newRank);
};
inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}});
inp.addEventListener('blur',apply);
});
}

function addPlayer(){
const inp=el('new-name');
const name=inp.value.trim();if(!name)return;
const maxR=S.players.reduce((m,p)=>Math.max(m,p.rank),0);
S.players.push({id:S.nextId++,name,rank:maxR+1,totalPts:0,wins:0,losses:0,sessions:0,rankDelta:0});
save();inp.value='';render();toast(name+' added');
}

function bulkAddPlayers(){
const ta=el('bulk-names');
const names=ta.value.split('\n').map(n=>n.trim()).filter(Boolean);
if(!names.length)return;
let maxR=S.players.reduce((m,p)=>Math.max(m,p.rank),0);
names.forEach(name=>{
maxR++;
S.players.push({id:S.nextId++,name,rank:maxR,totalPts:0,wins:0,losses:0,sessions:0,rankDelta:0});
});
save();ta.value='';render();toast(names.length+' players added');
}

function doRemovePlayer(id){
id=Number(id);
const p=gp(id);const name=p?p.name:'Player';
S.players=S.players.filter(x=>x.id!==id);
S.players.sort((a,b)=>a.rank-b.rank).forEach((x,i)=>x.rank=i+1);
pendingRemovePlayer=null;
save();render();toast(name+' removed from ladder');
}


// ── Set player rank manually ──────────────────────────────────────────
function setPlayerRank(pid,newRank){
pid=Number(pid);
const target=gp(pid);
if(!target)return;
const oldRank=target.rank;
if(newRank===oldRank)return;
// Shift others: if moving up (lower number), push others down; if moving down, push others up
S.players.forEach(p=>{
if(p.id===pid)return;
if(newRank<oldRank && p.rank>=newRank && p.rank<oldRank) p.rank++;
if(newRank>oldRank && p.rank<=newRank && p.rank>oldRank) p.rank--;
});
target.rank=newRank;
// Normalise to remove any gaps
[...S.players].sort((a,b)=>a.rank-b.rank).forEach((p,i)=>p.rank=i+1);
save();renderPlayers();toast(target.name+' moved to #'+newRank);
}

// ── Session setup ─────────────────────────────────────────────────────
let setup={attending:new Set(),numCourts:2,numRounds:2,rankBasis:'points'};
function openSessionModal(){
if(S.activeSession){toast('Finish the active session first');showTab('session');return;}
if(S.players.length<4){toast('Add at least 4 players first');return;}
setup={attending:new Set(),numCourts:2,numRounds:2,rankBasis:'points'};
buildModal();
}
function buildModal(){
const sorted=[...S.players].sort((a,b)=>a.rank-b.rank);
const m=document.createElement('div');
m.className='modal-bg';m.id='setup-modal';
let g=sorted.map(p=>'<div class="player-check" data-pid="'+p.id+'"><div class="check-name">'+p.name+'</div><div class="check-rank">#'+p.rank+'</div></div>').join('');
let rb=[{v:'points',l:'Points'},{v:'wins',l:'Wins then Points'}].map(o=>'<button class="score-opt'+(setup.rankBasis===o.v?' active':'')+'" data-rankbasis="'+o.v+'">'+o.l+'</button>').join('');
m.innerHTML='<div class="modal"><button id="modal-close-btn" class="modal-close">✕</button><div class="modal-title">New Session (Singles)</div><div class="modal-sub">Who\'s playing today?</div><div class="player-grid" id="attend-grid">'+g+'</div><div style="display:flex;gap:14px;margin-bottom:14px;"><div><div class="section-label" style="margin-bottom:7px;">Number of Courts</div><input type="number" id="courts-input" class="add-input" style="max-width:90px;" min="1" max="12" value="'+setup.numCourts+'"></div><div><div class="section-label" style="margin-bottom:7px;">Number of Rounds</div><input type="number" id="rounds-input" class="add-input" style="max-width:90px;" min="1" max="10" value="'+setup.numRounds+'"></div></div><div style="margin-bottom:14px;"><div class="section-label" style="margin-bottom:7px;">Ranking Basis (within a court)</div><div style="display:flex;gap:7px;" id="rankbasis-row">'+rb+'</div></div><div id="modal-preview" style="font-size:12px;color:var(--muted);margin-bottom:14px;"></div><div class="btn-row"><button class="btn btn-primary" id="start-session-btn">Start Session</button><button class="btn btn-outline" id="cancel-modal-btn">Cancel</button></div></div>';
document.body.appendChild(m);
m.querySelectorAll('.player-check').forEach(c=>{
c.addEventListener('click',()=>{
const pid=Number(c.dataset.pid);
if(setup.attending.has(pid)){setup.attending.delete(pid);c.classList.remove('attending');}
else{setup.attending.add(pid);c.classList.add('attending');}
updatePreview();
});
});
el('courts-input').addEventListener('input',()=>{
setup.numCourts=Math.max(1,parseInt(el('courts-input').value)||1);
updatePreview();
});
el('rounds-input').addEventListener('input',()=>{
setup.numRounds=Math.max(1,parseInt(el('rounds-input').value)||1);
updatePreview();
});
m.querySelectorAll('[data-rankbasis]').forEach(b=>{
b.addEventListener('click',()=>{
setup.rankBasis=b.dataset.rankbasis;
m.querySelectorAll('[data-rankbasis]').forEach(x=>x.classList.toggle('active',x===b));
});
});
el('modal-close-btn').addEventListener('click',closeModal);
el('cancel-modal-btn').addEventListener('click',closeModal);
el('start-session-btn').addEventListener('click',startSession);
updatePreview();
}
function updatePreview(){
const n=setup.attending.size,c=setup.numCourts;
const pv=el('modal-preview');if(!pv)return;
if(n<4){pv.textContent='Need at least 4 attending players.';return;}
if(c<1){pv.textContent='Need at least 1 court.';return;}
const sizes=courtSizes(n,c);
if(sizes[0]<2){pv.textContent='Too many courts for '+n+' players — reduce court count (each court needs ≥2 players).';return;}
pv.textContent=n+' players → '+sizes.map((g,i)=>'Court '+(i+1)+': '+g+' players').join(', ')+' · '+setup.numRounds+' round'+(setup.numRounds>1?'s':'')+' · ranked by '+(setup.rankBasis==='wins'?'wins':'points');
}
function closeModal(){const m=el('setup-modal');if(m)m.remove();}

// ── Pairings ──────────────────────────────────────────────────────────
function roundRobin(ids){
const games=[];
for(let i=0;i<ids.length;i++){
for(let j=i+1;j<ids.length;j++){
games.push({p1:ids[i],p2:ids[j],s1:null,s2:null});
}
}
return games;
}
function courtSizes(n,numCourts){
const base=Math.floor(n/numCourts),extra=n%numCourts;
return Array.from({length:numCourts},(_,c)=>base+(c>=numCourts-extra?1:0));
}
function buildCourts(ids,numCourts){
const sorted=[...ids].sort((a,b)=>gp(a).rank-gp(b).rank);
const sizes=courtSizes(sorted.length,numCourts);
const courts=[];let idx=0;
sizes.forEach(size=>{
const cp=sorted.slice(idx,idx+size);idx+=size;
courts.push({players:cp,games:roundRobin(cp),maxScore:21});
});
return courts;
}
function startSession(){
const att=[...setup.attending];
if(att.length<4){toast('Need at least 4 players');return;}
if(courtSizes(att.length,setup.numCourts)[0]<2){toast('Reduce court count — each court needs at least 2 players');return;}
const courts=buildCourts(att,setup.numCourts);
const bands=courts.map(c=>c.players.map(id=>gp(id).rank).sort((a,b)=>a-b));
S.activeSession={
date:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),
numRounds:setup.numRounds,
rankBasis:setup.rankBasis,
round:1,
bands:bands,
courts:courts,
rounds:[],
skipped:S.players.map(p=>p.id).filter(id=>!setup.attending.has(id)),
attending:att
};
save();closeModal();showTab('session');toast('Session started! 🏸');
}

// ── Session render ────────────────────────────────────────────────────
function renderSession(){
const root=el('tab-session');
if(!S.activeSession){
root.innerHTML='<div class="empty"><div class="empty-icon">🎮</div>No active session.<br>Tap <strong>+ New Session</strong> to begin.</div>';
return;
}
const s=S.activeSession;
const totalG=s.courts.reduce((sum,c)=>sum+c.games.length,0);
const doneG=s.courts.reduce((sum,c)=>sum+c.games.filter(g=>g.s1!==null&&g.s2!==null).length,0);
const allDone=doneG===totalG;
const pct=totalG?Math.round(doneG/totalG*100):0;

let h='<div class="session-panel">'
+'<div class="session-title">Session — '+s.date+' · Round '+s.round+' of '+s.numRounds+'</div>'
+'<div class="session-meta">'+s.courts.length+' court'+(s.courts.length>1?'s':'')+' · '+s.attending.length+' playing · '+doneG+'/'+totalG+' games scored</div>'
+'<div class="progress-wrap"><div class="progress-fill" style="width:'+pct+'%"></div></div>';

// Pending remove banner for session
if(pendingRemoveSession!==null){
const {ci,pid}=pendingRemoveSession;
h+='<div class="confirm-banner"><span class="confirm-banner-msg">Remove <strong>'+nameOf(pid)+'</strong> from Court '+(ci+1)+'? Their games will be cleared.</span>'
+'<div class="confirm-banner-btns"><button class="cbtn-yes" id="sess-confirm-yes">Remove</button><button class="cbtn-no" id="sess-confirm-no">Cancel</button></div></div>';
}

if(s.rounds.length){
h+='<div class="section-label" style="margin-top:4px;">Previous Rounds</div>';
s.rounds.forEach((r,ri)=>{
h+='<div class="card" style="margin-bottom:10px;"><div style="font-weight:700;color:var(--green);font-size:12px;margin-bottom:6px;">Round '+(ri+1)+'</div>';
r.courts.forEach((c,ci)=>{
if(ci>0)h+='<hr class="div">';
h+='<div style="font-size:12px;margin-bottom:4px;"><strong>Court '+(ci+1)+':</strong> '+c.players.map(id=>nameOf(id)).join(', ')+'</div>';
c.games.forEach((g,gi)=>{
h+='<div style="font-size:11px;color:var(--muted);">G'+(gi+1)+': '+nameOf(g.p1)+' '+g.s1+'–'+g.s2+' '+nameOf(g.p2)+'</div>';
});
});
h+='</div>';
});
}

s.courts.forEach((court,ci)=>{
const{ranked,ptMap}=tallyCourt(court,s.rankBasis);
const numCourts=s.courts.length;

h+='<div class="court-block">'
+'<div class="court-hdr"><span class="court-lbl">🏸 Court '+(ci+1)+(ci===0&&numCourts>1?' (Top)':ci===numCourts-1&&numCourts>1?' (Bottom)':'')+'</span>'
+'<span class="court-fmt">'+court.players.length+'p · '+court.games.length+' games</span></div>';

// Pills with remove buttons
h+='<div class="court-pills">';
court.players.forEach(id=>{
h+='<span class="pill">'+nameOf(id)
+' <button class="pill-remove" data-ci="'+ci+'" data-pid="'+id+'" title="Remove from session">✕</button></span>';
});
h+='</div>';

h+='<div class="max-score-row">Max score: '
+[15,21].map(n=>'<button class="score-opt'+(court.maxScore===n?' active':'')+'" data-ci="'+ci+'" data-ms="'+n+'">'+n+'</button>').join('')
+'</div>';

court.games.forEach((game,gi)=>{
const scored=game.s1!==null&&game.s2!==null;
const w1=scored&&game.s1>game.s2,w2=scored&&game.s2>game.s1;
h+='<div class="game-card">'
+'<div class="game-card-hdr"><span class="game-num">GAME '+(gi+1)+'</span>'
+(scored
?'<span class="game-status-done">✓ Scored &nbsp;<button class="edit-btn" data-ci="'+ci+'" data-gi="'+gi+'">edit</button></span>'
:'<span class="game-status-pending">● Enter score</span>')
+'</div>'
+'<div class="game-score-body">'
+'<div class="pair-col'+(scored?(w1?' won':' lost'):'')+'"><div class="pair-names-stacked">'+nameOf(game.p1)+'</div>'
+'<div class="score-inputs"><input class="score-input'+(scored?(w1?' winning':' losing'):'')+'" id="s-'+ci+'-'+gi+'-1" type="number" min="0" max="'+court.maxScore+'" placeholder="—" value="'+(game.s1!==null?game.s1:'')+'" data-ci="'+ci+'" data-gi="'+gi+'" data-pair="1"></div></div>'
+'<div class="vs-col"><span class="vs-text">VS</span>'+(scored?'<span class="vs-score">'+game.s1+'–'+game.s2+'</span>':'')+'</div>'
+'<div class="pair-col'+(scored?(w2?' won':' lost'):'')+'"><div class="pair-names-stacked">'+nameOf(game.p2)+'</div>'
+'<div class="score-inputs"><input class="score-input'+(scored?(w2?' winning':' losing'):'')+'" id="s-'+ci+'-'+gi+'-2" type="number" min="0" max="'+court.maxScore+'" placeholder="—" value="'+(game.s2!==null?game.s2:'')+'" data-ci="'+ci+'" data-gi="'+gi+'" data-pair="2"></div></div>'
+'</div></div>';
});

// Live scoreboard
const gamesPlayed=court.games.filter(g=>g.s1!==null&&g.s2!==null).length;
if(gamesPlayed>0){
h+='<div class="scoreboard"><div class="scoreboard-title">Live Standings — Court '+(ci+1)+'</div>';
ranked.forEach((id,i)=>{
let tag='';
if(numCourts>1&&allDone){
if(ci>0&&i<2) tag='<span class="sb-tag tag-up">▲ Move Up</span>';
if(ci<numCourts-1&&i>=ranked.length-2) tag='<span class="sb-tag tag-down">▼ Move Down</span>';
}
h+='<div class="sb-row"><span class="sb-rank">'+(i+1)+'</span><span class="sb-name">'+nameOf(id)+'</span><span class="sb-pts">'+(ptMap[id]||0)+' pts</span>'+tag+'</div>';
});
h+='</div>';
}
h+='</div>';
});

if(s.skipped.length){
h+='<div style="background:var(--red-dim);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:12px;">⚠ Skipped today (−2 ranks): <strong>'+s.skipped.map(id=>nameOf(id)).join(', ')+'</strong></div>';
}

const isLastRound=s.round>=s.numRounds;
const btnLabel=isLastRound?'Finalise &amp; Update Rankings':'Complete Round '+s.round+' → Start Round '+(s.round+1);
const btnId=isLastRound?'finalise-btn':'advance-round-btn';
h+='<div class="btn-row">'
+'<button class="btn btn-primary" id="'+btnId+'"'+(allDone?'':' disabled')+'>'+btnLabel+'</button>'
+'<button class="btn btn-danger" id="cancel-session-btn">Cancel Session</button>'
+'</div>'
+'<div style="font-size:12px;color:'+(allDone?'var(--green)':'var(--muted)')+';margin-top:8px;">'
+(allDone?(isLastRound?'All games scored — ready to finalise! 🏆':'Round '+s.round+' complete — ready for the next round! 🏸'):(totalG-doneG)+' game'+(totalG-doneG!==1?'s':'')+' remaining.')
+'</div></div>';

root.innerHTML=h;

// ── Bind all session events ──
if(pendingRemoveSession!==null){
el('sess-confirm-yes').addEventListener('click',()=>doRemoveFromSession(pendingRemoveSession.ci,pendingRemoveSession.pid));
el('sess-confirm-no').addEventListener('click',()=>{pendingRemoveSession=null;renderSession();});
}

root.querySelectorAll('.pill-remove').forEach(btn=>{
btn.addEventListener('click',e=>{
e.stopPropagation();
pendingRemoveSession={ci:Number(btn.dataset.ci),pid:Number(btn.dataset.pid)};
renderSession();
});
});

root.querySelectorAll('[data-ms]').forEach(btn=>{
btn.addEventListener('click',()=>{
S.activeSession.courts[Number(btn.dataset.ci)].maxScore=Number(btn.dataset.ms);
save();renderSession();
});
});

root.querySelectorAll('.edit-btn').forEach(btn=>{
btn.addEventListener('click',()=>{
const ci=Number(btn.dataset.ci),gi=Number(btn.dataset.gi);
S.activeSession.courts[ci].games[gi].s1=null;
S.activeSession.courts[ci].games[gi].s2=null;
save();renderSession();
});
});

root.querySelectorAll('.score-input').forEach(inp=>{
inp.addEventListener('input',()=>{
const ci=Number(inp.dataset.ci),gi=Number(inp.dataset.gi);
const v1=el('s-'+ci+'-'+gi+'-1')?.value;
const v2=el('s-'+ci+'-'+gi+'-2')?.value;
if(v1===''||v2===''||v1===undefined||v2===undefined)return;
const s1=parseInt(v1),s2=parseInt(v2);
if(isNaN(s1)||isNaN(s2))return;
S.activeSession.courts[ci].games[gi].s1=s1;
S.activeSession.courts[ci].games[gi].s2=s2;
save();
const ms=S.activeSession.courts[ci].maxScore||21;
if(s1===ms||s2===ms){renderSession();}
});
});

const fb=el('finalise-btn');
if(fb)fb.addEventListener('click',finaliseSession);
const ab=el('advance-round-btn');
if(ab)ab.addEventListener('click',advanceRound);
const cb=el('cancel-session-btn');
if(cb)cb.addEventListener('click',cancelSession);
}

// ── Remove from session ───────────────────────────────────────────────
function doRemoveFromSession(ci,pid){
pid=Number(pid);
const name=nameOf(pid);
const court=S.activeSession.courts[ci];
court.players=court.players.filter(id=>id!==pid);
court.games=court.games.filter(g=>g.p1!==pid&&g.p2!==pid);
if(court.players.length>=2){
court.games=roundRobin(court.players);
} else {
court.games=[];
}
S.activeSession.attending=S.activeSession.attending.filter(id=>id!==pid);
pendingRemoveSession=null;
save();renderSession();toast(name+' removed from session');
}

// ── Per-round computation (shared by advanceRound and finaliseSession) ─
function tallyCourt(court,rankBasis){
const ptMap={},winMap={};
court.players.forEach(id=>{ptMap[id]=0;winMap[id]=0;});
court.games.forEach(g=>{
if(g.s1!==null&&g.s2!==null){
ptMap[g.p1]=(ptMap[g.p1]||0)+g.s1;
ptMap[g.p2]=(ptMap[g.p2]||0)+g.s2;
if(g.s1>g.s2)winMap[g.p1]++;else winMap[g.p2]++;
}
});
const ranked=[...court.players].sort((a,b)=>{
if(rankBasis==='wins'){
const dw=(winMap[b]||0)-(winMap[a]||0);
if(dw!==0)return dw;
}
const d=(ptMap[b]||0)-(ptMap[a]||0);return d!==0?d:gp(a).rank-gp(b).rank;
});
return{ranked,ptMap,winMap,players:court.players};
}
function accumulateStats(court){
const ptMap={};court.players.forEach(id=>ptMap[id]=0);
court.games.forEach(g=>{
if(g.s1!==null&&g.s2!==null){
ptMap[g.p1]=(ptMap[g.p1]||0)+g.s1;
ptMap[g.p2]=(ptMap[g.p2]||0)+g.s2;
const p1=gp(g.p1),p2=gp(g.p2);
if(g.s1>g.s2){
if(p1){p1.wins++;p1.sessions++;}
if(p2){p2.losses++;p2.sessions++;}
} else {
if(p2){p2.wins++;p2.sessions++;}
if(p1){p1.losses++;p1.sessions++;}
}
}
});
court.players.forEach(id=>{const p=gp(id);if(p)p.totalPts=(p.totalPts||0)+(ptMap[id]||0);});
}
function computeRoundVirtualRanks(courts,bands,rankBasis){
const tallies=courts.map(c=>tallyCourt(c,rankBasis));
const virtual={};
tallies.forEach((t,ci)=>{
const slots=[...bands[ci]].sort((a,b)=>a-b);
t.ranked.forEach((id,i)=>{virtual[id]=slots[i];});
});
for(let ci=0;ci<courts.length-1;ci++){
const upperIds=tallies[ci].ranked;
const lowerIds=tallies[ci+1].ranked;
if(upperIds.length>=2&&lowerIds.length>=2){
const bU=[upperIds[upperIds.length-2],upperIds[upperIds.length-1]];
const tL=[lowerIds[0],lowerIds[1]];
const allRanks=[...bU,...tL].map(id=>virtual[id]).sort((a,b)=>a-b);
const ordered=[...tL,...bU];
ordered.forEach((id,i)=>{virtual[id]=allRanks[i];});
}
}
return virtual;
}
function regroupForNextRound(session,virtualRanks){
const rankToCourtIdx={};
session.bands.forEach((band,ci)=>band.forEach(r=>rankToCourtIdx[r]=ci));
const buckets=session.bands.map(()=>[]);
session.attending.forEach(id=>{
const vr=virtualRanks[id];
if(vr===undefined)return;
const ci=rankToCourtIdx[vr];
if(ci!==undefined)buckets[ci].push(id);
});
return buckets.map((ids,ci)=>{
const sorted=[...ids].sort((a,b)=>virtualRanks[a]-virtualRanks[b]);
return{players:sorted,games:roundRobin(sorted),maxScore:session.courts[ci]?session.courts[ci].maxScore:21};
});
}

// ── Advance to next round ───────────────────────────────────────────────
function advanceRound(){
const s=S.activeSession;
s.courts.forEach(accumulateStats);
const virtual=computeRoundVirtualRanks(s.courts,s.bands,s.rankBasis);
s.rounds.push({courts:s.courts});
s.courts=regroupForNextRound(s,virtual);
s.round+=1;
save();renderSession();toast('Round '+(s.round-1)+' complete — Round '+s.round+' started! 🏸');
}

// ── Finalise ──────────────────────────────────────────────────────────
function finaliseSession(){
const s=S.activeSession;
const oldRanks={};S.players.forEach(p=>oldRanks[p.id]=p.rank);

s.courts.forEach(accumulateStats);
const virtual=computeRoundVirtualRanks(s.courts,s.bands,s.rankBasis);
s.attending.forEach(id=>{const p=gp(id);if(p&&virtual[id]!==undefined)p.rank=virtual[id];});

// Skip penalty
s.skipped.forEach(id=>{const p=gp(id);if(p)p.rank=Math.min(p.rank+2,S.players.length);});

// Normalise
[...S.players].sort((a,b)=>a.rank-b.rank).forEach((p,i)=>p.rank=i+1);

const rankChanges=[];
S.players.forEach(p=>{p.rankDelta=(oldRanks[p.id]||p.rank)-p.rank;rankChanges.push({name:p.name,delta:p.rankDelta});});

s.rounds.push({courts:s.courts});
delete s.courts;
s.rankChanges=rankChanges;
S.sessions.push({...s});
S.activeSession=null;
save();showTab('ladder');toast('Rankings updated! 🏆');
}

function cancelSession(){
S.activeSession=null;save();showTab('ladder');toast('Session cancelled');
}

// ── History ───────────────────────────────────────────────────────────
function renderHistory(){
const root=el('tab-history');
if(!S.sessions.length){root.innerHTML='<div class="empty"><div class="empty-icon">📋</div>No sessions yet.</div>';return;}
let h='';
[...S.sessions].reverse().forEach(s=>{
const roundsArr=s.rounds&&s.rounds.length?s.rounds:[{courts:s.courts}];
h+='<div class="history-card"><div class="history-date">'+s.date+' · '+roundsArr.length+' round'+(roundsArr.length>1?'s':'')+' · '+roundsArr[0].courts.length+' courts · '+s.attending.length+' players</div>';
roundsArr.forEach((r,ri)=>{
if(roundsArr.length>1)h+='<div style="font-weight:700;color:var(--green);font-size:12px;margin:8px 0 4px;">Round '+(ri+1)+'</div>';
r.courts.forEach((c,ci)=>{
if(ci>0)h+='<hr class="div">';
h+='<div style="font-size:12px;margin-bottom:5px;"><strong style="color:var(--green)">Court '+(ci+1)+':</strong> '+c.players.map(id=>nameOf(id)).join(', ')+'</div>';
c.games.forEach((g,gi)=>{
const sc=g.s1!==null&&g.s2!==null;
h+='<div style="font-size:12px;color:var(--muted);margin-bottom:3px;">G'+(gi+1)+': '+nameOf(g.p1)+' <strong style="color:var(--text)">'+(sc?g.s1:'?')+'</strong> – <strong style="color:var(--text)">'+(sc?g.s2:'?')+'</strong> '+nameOf(g.p2)+'</div>';
});
});
});
if(s.skipped&&s.skipped.length)h+='<div style="font-size:11px;color:var(--red);margin-top:6px;">Skipped: '+s.skipped.map(id=>nameOf(id)).join(', ')+'</div>';
if(s.rankChanges){
const changes=s.rankChanges.filter(r=>r.delta!==0);
if(changes.length)h+='<div style="font-size:11px;color:var(--muted);margin-top:6px;">'+changes.map(r=>r.name+' '+(r.delta>0?'▲'+r.delta:'▼'+Math.abs(r.delta))).join(' · ')+'</div>';
}
h+='</div>';
});
root.innerHTML=h;
}

render();
</script>
</body>
</html>
